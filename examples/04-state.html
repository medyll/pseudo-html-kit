<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Example 04 — Reactive State</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }

    /* Read state from :root data-* attributes */
    :root[data-focus-mode] .sidebar {
      display: none;
    }

    :root[data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #f5f5f5;
    }

    :root[data-theme="light"] {
      --bg: #ffffff;
      --text: #1a1a1a;
    }

    body {
      background: var(--bg, #fff);
      color: var(--text, #1a1a1a);
      transition: background 0.3s, color 0.3s;
    }
  </style>
</head>
<body>
  <h1>Example 04 — Reactive State</h1>
  <p>Global state that connects to CSS via data-* attributes.</p>

  <div class="controls">
    <label>
      <input type="checkbox" id="focus-toggle"> Focus Mode
    </label>
    <select id="theme-select">
      <option value="light">Light Theme</option>
      <option value="dark">Dark Theme</option>
    </select>
  </div>

  <aside class="sidebar">
    <h3>Sidebar</h3>
    <p>This disappears in focus mode.</p>
  </aside>

  <main>
    <p>Main content area.</p>
  </main>

  <script type="module">
    import PseudoKit from '../src/client/pseudo-kit-client.js';

    // Focus mode toggle
    document.getElementById('focus-toggle').addEventListener('change', (e) => {
      PseudoKit.state.focusMode = e.target.checked;
      // CSS reads: :root[data-focus-mode]
    });

    // Theme toggle
    document.getElementById('theme-select').addEventListener('change', (e) => {
      PseudoKit.state.theme = e.target.value;
      // CSS reads: :root[data-theme="dark"] or :root[data-theme="light"]
    });
  </script>
</body>
</html>
