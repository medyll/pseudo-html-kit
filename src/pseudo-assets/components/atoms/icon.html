<!--
  @component icon-pk
  @layer atoms

  @prop {string} [name] - Icon identifier (reserved for icon-font / sprite usage)
  @prop {'xs'|'sm'|'md'|'lg'|'xl'} [size='md'] - Icon box size preset
  @prop {string} [label] - Accessible label; also accepted as `aria-label`. When set the icon is
    exposed to assistive technology (aria-hidden removed from inner span).

  @slot default - SVG or img element to render as the icon
-->
<template>
  <span class="icon" role="img" aria-hidden="true">
    <slot></slot>
  </span>
</template>

<style>
  @scope (.icon) {
    :scope {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: var(--icon-size-md, 1.25rem);
      height: var(--icon-size-md, 1.25rem);
      color: inherit;
    }

    :scope[size="xs"] { width: var(--icon-size-xs, .75rem);  height: var(--icon-size-xs, .75rem); }
    :scope[size="sm"] { width: var(--icon-size-sm, 1rem);    height: var(--icon-size-sm, 1rem); }
    :scope[size="lg"] { width: var(--icon-size-lg, 1.5rem);  height: var(--icon-size-lg, 1.5rem); }
    :scope[size="xl"] { width: var(--icon-size-xl, 2rem);    height: var(--icon-size-xl, 2rem); }

    :scope[label] { aria-hidden: false; }

    /* Ensure SVG fills the icon container */
    ::slotted(svg) {
      width: 100%;
      height: 100%;
      display: block;
    }
  }
</style>

<script>
// Forward aria-label from host to the inner role="img" span; expose to AT when labelled.
const icon = el.querySelector('.icon');
if (icon) {
  const lbl = el.getAttribute('aria-label') || el.getAttribute('label');
  if (lbl) {
    icon.setAttribute('aria-label', lbl);
    icon.removeAttribute('aria-hidden');
    el.removeAttribute('aria-label');
  }
}
</script>
