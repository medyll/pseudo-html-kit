<!--
  @component rating-pk
  @layer atoms

  @prop {number} value - Current rating value (e.g. 3.5)
  @prop {number} [max=5] - Total number of stars
  @prop {boolean} [readonly] - Prevent user interaction (display-only mode)
  @prop {'sm'|'md'|'lg'} [size='md'] - Star size preset
  @prop {string} [label] - Accessible label (e.g. "Rating: 4 out of 5 stars")
-->
<template>
  <div class="rating" role="img" aria-label="Rating">
    <span class="rating__star" aria-hidden="true">★</span>
    <span class="rating__star" aria-hidden="true">★</span>
    <span class="rating__star" aria-hidden="true">★</span>
    <span class="rating__star" aria-hidden="true">★</span>
    <span class="rating__star" aria-hidden="true">★</span>
    <span class="rating__value sr-only"></span>
  </div>
</template>

<style>
  @scope (.rating) {
    :scope {
      display: inline-flex;
      align-items: center;
      gap: .1rem;
      --star-color-on:  var(--color-rating, #f59e0b);
      --star-color-off: var(--color-surface-3, #e2e8f0);
      --star-size: 1.25rem;
    }

    :scope[size="sm"] { --star-size: 1rem; }
    :scope[size="lg"] { --star-size: 1.75rem; }

    .rating__star {
      font-size: var(--star-size);
      color: var(--star-color-off);
      line-height: 1;
      transition: color .1s;
    }

    /* Fill stars based on data-value via nth-child (set by script or inline) */
    :scope[value="1"] .rating__star:nth-child(-n+1),
    :scope[value="2"] .rating__star:nth-child(-n+2),
    :scope[value="3"] .rating__star:nth-child(-n+3),
    :scope[value="4"] .rating__star:nth-child(-n+4),
    :scope[value="5"] .rating__star:nth-child(-n+5) {
      color: var(--star-color-on);
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }
    @media (prefers-reduced-motion: reduce) {
      :scope, :scope * { transition: none; animation: none; }
    }
  }
</style>
