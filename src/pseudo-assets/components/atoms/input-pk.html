<!--
  @component input-pk
  @layer atoms

  @prop {'text'|'email'|'password'|'number'|'search'|'tel'|'url'} [type='text'] - Native input type
  @prop {string} name - Form field name (forwarded to inner `<input>`)
  @prop {string} [id] - Field id; forwarded to inner `<input>` and removed from host
  @prop {string} [placeholder] - Placeholder text shown when field is empty
  @prop {string} [value] - Initial field value
  @prop {boolean} [disabled] - Disables the field
  @prop {boolean} [required] - Marks the field as required for form validation
  @prop {string} [pattern] - Regex pattern for validation (forwarded to inner `<input>`)
  @prop {string|number} [min] - Minimum value (forwarded to inner `<input>`)
  @prop {string|number} [max] - Maximum value (forwarded to inner `<input>`)
  @prop {'sm'|'md'|'lg'} [size='md'] - Field size preset

  @slot prefix - Icon or text rendered before (to the left of) the input field
  @slot suffix - Icon or text rendered after (to the right of) the input field
-->
<template>
  <div class="input">
    <span class="input__prefix" aria-hidden="true">
      <slot name="prefix"></slot>
    </span>
    <input class="input__field" type="text" />
    <span class="input__suffix" aria-hidden="true">
      <slot name="suffix"></slot>
    </span>
    <div class="input__error-popover" popover="auto" role="alert" aria-live="polite" aria-atomic="true"></div>
    <span class="input__error-fallback" role="alert" aria-live="polite" aria-atomic="true"></span>
  </div>
</template>

<style>
  @scope (.input) {
    :scope {
      display: flex;
      flex-direction: column;
      gap: .25rem;
      width: 100%;
    }

    /* Wrapper row (prefix + field + suffix) */
    :scope {
      --input-border: var(--color-border, #cbd5e0);
      --input-bg: var(--color-surface-1, #fff);
      --input-radius: var(--radius-md, .375rem);
      --input-padding: .5rem .75rem;
      --input-font: var(--text-sm, .875rem);
    }

    /* Row */
    :scope::before {
      content: none; /* no pseudo-element wrapper needed — flex handles layout */
    }

    .input__field {
      flex: 1;
      width: 100%;
      padding: var(--input-padding);
      border: 1.5px solid var(--input-border);
      border-radius: var(--input-radius);
      background-color: var(--input-bg);
      color: var(--color-text, #1a202c);
      font-family: var(--font-sans, system-ui, sans-serif);
      font-size: var(--input-font);
      line-height: 1.5;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      min-width: 0;
    }

    .input__field::placeholder {
      color: var(--color-text-muted, #a0aec0);
    }

    .input__field:focus-visible {
      border-color: var(--color-primary, #3b82f6);
      box-shadow: 0 0 0 3px var(--color-primary-ring, rgba(59,130,246,.2));
    }

    .input__field:disabled {
      opacity: .5;
      cursor: not-allowed;
      background-color: var(--color-surface-2, #edf2f7);
    }

    /* HTML5 Constraint Validation States */
    .input__field:invalid {
      border-color: var(--color-danger, #ef4444);
    }
    .input__field:invalid:focus-visible {
      box-shadow: 0 0 0 3px var(--color-danger-ring, rgba(239,68,68,.2));
    }

    .input__field:user-invalid {
      border-color: var(--color-danger, #ef4444);
    }
    .input__field:user-invalid:focus-visible {
      box-shadow: 0 0 0 3px var(--color-danger-ring, rgba(239,68,68,.2));
    }

    .input__field:valid:not(:placeholder-shown) {
      border-color: var(--color-success, #10b981);
    }

    /* Popover error hint */
    .input__error-popover {
      position: absolute;
      padding: .5rem .75rem;
      background-color: var(--color-surface-1, #fff);
      border: 1.5px solid var(--color-danger, #ef4444);
      border-radius: var(--input-radius, .375rem);
      font-size: var(--text-xs, .75rem);
      color: var(--color-danger, #ef4444);
      max-width: 200px;
      word-wrap: break-word;
      z-index: 1000;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
    }

    /* Fallback error span (for older browsers without Popover API) */
    .input__error-fallback {
      display: none;
      font-size: var(--text-xs, .75rem);
      color: var(--color-danger, #ef4444);
      flex: 0 0 100%;
    }
    :scope[data-validation-error="true"] .input__error-fallback {
      display: block;
    }

    /* Legacy error state (deprecated, kept for backward compatibility) */
    /* Legacy error state (deprecated, kept for backward compatibility) */
    :scope[error] .input__field {
      border-color: var(--color-danger, #ef4444);
    }
    :scope[error] .input__field:focus-visible {
      box-shadow: 0 0 0 3px var(--color-danger-ring, rgba(239,68,68,.2));
    }

    .input__error {
      display: none;
      font-size: var(--text-xs, .75rem);
      color: var(--color-danger, #ef4444);
    }
    :scope[error] .input__error { display: block; }

    /* Prefix / suffix decoration */
    .input__prefix:not(:empty),
    .input__suffix:not(:empty) {
      display: flex;
      align-items: center;
      padding: .5rem .625rem;
      background-color: var(--color-surface-2, #edf2f7);
      border: 1.5px solid var(--input-border);
      color: var(--color-text-muted, #718096);
      font-size: var(--text-sm, .875rem);
    }
    .input__prefix:not(:empty) {
      border-right: none;
      border-radius: var(--input-radius) 0 0 var(--input-radius);
    }
    .input__suffix:not(:empty) {
      border-left: none;
      border-radius: 0 var(--input-radius) var(--input-radius) 0;
    }
    :scope:has(.input__prefix:not(:empty)) .input__field {
      border-radius: 0 var(--input-radius) var(--input-radius) 0;
    }
    :scope:has(.input__suffix:not(:empty)) .input__field {
      border-radius: var(--input-radius) 0 0 var(--input-radius);
    }

    /* Sizes */
    :scope[size="sm"] { --input-padding: .25rem .625rem; --input-font: var(--text-xs, .75rem); }
    :scope[size="lg"] { --input-padding: .75rem 1rem;    --input-font: var(--text-base, 1rem); }

    /* Row layout */
    :scope {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: stretch;
      position: relative;
    }
    .input__error-fallback { flex: 0 0 100%; }
    .input__error { flex: 0 0 100%; }
    @media (prefers-reduced-motion: reduce) {
      :scope, :scope * { transition: none; animation: none; }
    }
  }
</style>

<script>
// Forward host attributes to the inner <input> for proper labelling and semantics.
const field = el.querySelector('.input__field');
const errorPopover = el.querySelector('.input__error-popover');
const errorFallback = el.querySelector('.input__error-fallback');
const supportsPopover = 'popover' in HTMLElement.prototype;

if (field) {
  const fwd = ['type', 'name', 'placeholder', 'value', 'autocomplete', 'required', 'pattern', 'min', 'max'];
  fwd.forEach(attr => { if (el.hasAttribute(attr)) field.setAttribute(attr, el.getAttribute(attr)); });
  if (el.hasAttribute('id'))          { field.setAttribute('id', el.getAttribute('id')); el.removeAttribute('id'); }
  if (el.hasAttribute('aria-label'))  { field.setAttribute('aria-label', el.getAttribute('aria-label')); el.removeAttribute('aria-label'); }
  if (el.hasAttribute('aria-labelledby')) { field.setAttribute('aria-labelledby', el.getAttribute('aria-labelledby')); el.removeAttribute('aria-labelledby'); }
  if (el.hasAttribute('disabled'))    field.setAttribute('disabled', '');
}

// Validation event handlers
field?.addEventListener('invalid', (evt) => {
  evt.preventDefault();
  showValidationError();
});

field?.addEventListener('input', () => {
  if (field.validity.valid) {
    hideValidationError();
  } else {
    showValidationError();
  }
});

function showValidationError() {
  const msg = field.validationMessage || getConstraintMessage(field);
  
  if (supportsPopover && errorPopover) {
    errorPopover.textContent = msg;
    field.setAttribute('aria-describedby', 'error-popover');
    errorPopover.id = 'error-popover';
    errorPopover.showPopover?.();
  } else if (errorFallback) {
    errorFallback.textContent = msg;
    el.setAttribute('data-validation-error', 'true');
    field.setAttribute('aria-describedby', 'error-fallback');
    errorFallback.id = 'error-fallback';
  }
}

function hideValidationError() {
  if (supportsPopover && errorPopover) {
    errorPopover.hidePopover?.();
  }
  if (errorFallback) {
    el.removeAttribute('data-validation-error');
  }
  field?.removeAttribute('aria-describedby');
}

function getConstraintMessage(input) {
  const { validity } = input;
  if (validity.valueMissing) return `${input.name || 'This field'} is required.`;
  if (validity.typeMismatch) return `Please enter a valid ${input.type}.`;
  if (validity.patternMismatch) return `Please match the requested format.`;
  if (validity.tooShort) return `Please lengthen this text to ${input.minLength} characters or more.`;
  if (validity.tooLong) return `Please shorten this text to ${input.maxLength} characters or less.`;
  if (validity.rangeUnderflow) return `Value must be at least ${input.min}.`;
  if (validity.rangeOverflow) return `Value must be no more than ${input.max}.`;
  if (validity.stepMismatch) return `Please provide a valid value.`;
  return 'This field is invalid.';
}

// Expose validation methods on component element
el.checkValidity = function() {
  return field?.checkValidity?.() ?? true;
};

el.reportValidity = function() {
  const valid = field?.checkValidity?.() ?? true;
  if (!valid) {
    showValidationError();
  }
  return valid;
};
</script>
