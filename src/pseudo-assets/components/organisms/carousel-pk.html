<!--
  @component carousel-pk
  @layer organisms

  @prop {boolean} [autoplay]
  @prop {number} [interval]

  @slot default - slide items (each slide should be a block element)
-->
<template>
  <div class="carousel" role="region" aria-roledescription="carousel">
    <div class="carousel__track" tabindex="0">
      <slot></slot>
    </div>
  </div>
</template>

<style>
  @scope (.carousel) {
    :scope { width: 100%; overflow: hidden; }

    .carousel__track {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 0.25rem;
      scroll-padding: 1rem;
    }

    ::slotted(*) {
      min-width: 80%;
      flex: 0 0 auto;
      scroll-snap-align: start;
      border-radius: var(--radius-sm, .25rem);
      background: var(--color-surface-1, #fff);
    }

    /* Basic focus outline for the track (keyboard users) */
    .carousel__track:focus {
      outline: 3px solid Highlight;
      outline-offset: 4px;
    }
  }
</style>

<script>
// Minimal progressive enhancement: keyboard navigation
const track = el.querySelector('.carousel__track');
if (track) {
  track.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      track.scrollBy({ left: track.clientWidth * 0.8, behavior: 'smooth' });
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      track.scrollBy({ left: -track.clientWidth * 0.8, behavior: 'smooth' });
    } else if (e.key === 'Home') {
      e.preventDefault();
      track.scrollLeft = 0;
    } else if (e.key === 'End') {
      e.preventDefault();
      track.scrollLeft = track.scrollWidth;
    }
  });
}
</script>
