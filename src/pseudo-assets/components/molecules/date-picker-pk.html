<!--
  @component date-picker-pk
  @layer molecules

  @prop {string} [label] - Accessible label forwarded to the date input via aria-label
  @prop {string} [name] - Form field name forwarded to the inner input

  @slot default - optional calendar content
-->
<template>
  <div class="date-picker">
    <input class="date-picker__input" type="date" />
    <div class="date-picker__popover" role="dialog" aria-modal="false" style="display:none" aria-hidden="true">
      <div class="date-picker__calendar" role="grid"></div>
    </div>
  </div>
</template>

<style>
@scope (.date-picker) {
  :scope { position: relative; }
  .date-picker__popover { position: absolute; top: 100%; left: 0; z-index: 1000; background: var(--color-surface-1,#fff); border: 1px solid var(--color-border,#cbd5e0); padding:.5rem; box-shadow: var(--shadow-md,0 6px 18px rgba(0,0,0,.12)); }
  .date-picker__input { padding:.35rem .5rem; }
}
</style>

<script>
// Wire label and name props to input for accessibility (WCAG 1.3.1, 4.1.2)
const input = el.querySelector('.date-picker__input');
if (input) {
  const label = el.getAttribute('label') || el.getAttribute('aria-label');
  if (label) input.setAttribute('aria-label', label);
  const name = el.getAttribute('name');
  if (name) input.setAttribute('name', name);
}
const pop = el.querySelector('.date-picker__popover');

function _supportsNativeDate() {
  const i = document.createElement('input');
  i.type = 'date';
  return i.type === 'date' && i.showPicker !== undefined;
}

function _open() {
  if (typeof input.showPicker === 'function') {
    try { input.showPicker(); return; } catch (e) { /* fall through to fallback */ }
  }
  pop.style.display = '';
  pop.removeAttribute('aria-hidden');
}
function _close() {
  pop.style.display = 'none';
  pop.setAttribute('aria-hidden', 'true');
}

input.addEventListener('focus', () => { if (!_supportsNativeDate()) _open(); });
input.addEventListener('click', () => { if (!_supportsNativeDate()) _open(); });

// Simple calendar placeholder for tests — real calendar generation is out of scope for skeleton
const calendar = el.querySelector('.date-picker__calendar');
calendar.textContent = 'Calendar (placeholder)';

// Close on outside click
document.addEventListener('click', (ev) => {
  if (!el.contains(ev.target)) _close();
});
</script>
