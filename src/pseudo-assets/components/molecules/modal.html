<!--
  @component modal-pk
  @layer molecules

  @prop {string} [title] - Modal title shown in the header when no `header` slot is provided
  @prop {boolean} [open] - Controls whether the modal is visible
  @prop {'sm'|'md'|'lg'|'fullscreen'} [size='md'] - Width preset of the modal container
  @prop {boolean} [closeable=true] - Shows the × close button in the header

  @slot header - Custom header content; replaces the default title bar
  @slot default - Main modal body content
  @slot footer - Footer area for action buttons
-->
<template>
  <dialog class="modal" aria-labelledby="modal-title">
    <div class="modal__container">
      <div class="modal__header">
        <slot name="header">
          <span class="modal__title" id="modal-title">Modal</span>
        </slot>
        <button class="modal__close" type="button" aria-label="Close">✕</button>
      </div>
      <div class="modal__body">
        <slot>Modal content</slot>
      </div>
      <div class="modal__footer">
        <slot name="footer"></slot>
      </div>
    </div>
  </dialog>
</template>

<style>
  @scope (dialog.modal) {
    :scope {
      border: none;
      padding: 0;
      margin: auto;
      max-width: 32rem;
      max-height: calc(100dvh - 2rem);
      background-color: transparent;
      box-shadow: none;
      z-index: var(--z-modal, 500);
    }

    ::backdrop {
      background-color: rgba(0, 0, 0, .5);
    }

    .modal__container {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: inherit;
      max-height: inherit;
      background-color: var(--color-surface, #fff);
      border-radius: var(--radius-xl, .75rem);
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      overflow: hidden;
    }

    :scope[size="sm"] .modal__container { max-width: 20rem; }
    :scope[size="lg"] .modal__container { max-width: 48rem; }
    :scope[size="fullscreen"] .modal__container {
      max-width: 100vw;
      max-height: 100vh;
      border-radius: 0;
    }

    .modal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--color-border, #e2e8f0);
    }

    .modal__title {
      font-size: var(--text-lg, 1.125rem);
      font-weight: 600;
      color: var(--color-text, #1a202c);
    }

    .modal__close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border: none;
      border-radius: var(--radius-sm, .25rem);
      background: transparent;
      color: var(--color-text-muted, #64748b);
      cursor: pointer;
      font-size: .875rem;
      transition: background-color .12s;
      flex-shrink: 0;
    }
    .modal__close:hover { background-color: var(--color-surface-2, #f1f5f9); }

    :scope:not([closeable]) .modal__close { display: none; }

    .modal__body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
    }

    .modal__footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: .5rem;
      padding: .75rem 1.25rem;
      border-top: 1px solid var(--color-border, #e2e8f0);
    }
    .modal__footer:empty { display: none; }
  }
</style>

<script>
const dialog = el.querySelector('dialog.modal');
if (!dialog) {
  // <dialog> element not found — component initialization failed
  return;
}

// Close button wiring (works with or without Invoker Commands)
const closeBtn = dialog.querySelector('.modal__close');
if (closeBtn) {
  closeBtn.addEventListener('click', () => dialog.close());
}

// Backdrop click-to-close: clicking on the dialog itself (not on container) closes it
dialog.addEventListener('click', (e) => {
  if (e.target === dialog) dialog.close();
});

// Forward title prop to .modal__title if not using header slot
const titleEl = dialog.querySelector('.modal__title');
if (titleEl && el.hasAttribute('title')) {
  titleEl.textContent = el.getAttribute('title');
}

// Observe host [open] attribute for programmatic control
const observer = new MutationObserver(() => {
  const shouldBeOpen = el.hasAttribute('open');
  if (shouldBeOpen && !dialog.open) {
    dialog.showModal();
  } else if (!shouldBeOpen && dialog.open) {
    dialog.close();
  }
});
observer.observe(el, { attributes: true, attributeFilter: ['open'] });

// Sync dialog close event back to host [open] attribute
dialog.addEventListener('close', () => {
  el.removeAttribute('open');
});
</script>
